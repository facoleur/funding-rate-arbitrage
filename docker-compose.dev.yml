services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: option_arb
      POSTGRES_PASSWORD: option_arb
      POSTGRES_DB: option_arb
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U option_arb"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://option_arb:option_arb@postgres:5432/option_arb
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://option_arb:option_arb@postgres:5432/option_arb
      CONFIG_PATH: /app/config.yaml
    volumes:
      - ./backend/src:/app/src   # hot reload
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/data
      - backend_venv:/app/.venv  # préserve le .venv de l'image
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: uvicorn option_arb.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  workers:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://option_arb:option_arb@postgres:5432/option_arb
      CONFIG_PATH: /app/config.yaml
    volumes:
      - ./backend/src:/app/src   # hot reload
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/data
      - backend_venv:/app/.venv
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: python -m watchfiles "python -m option_arb.worker" /app/src
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:5173:5173"
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_dev_data:
  backend_venv:
  frontend_node_modules:
