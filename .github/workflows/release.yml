name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag
        id: meta
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/option-arb:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/option-arb:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ steps.meta.outputs.tag }}
          path: frontend/dist/
          retention-days: 7

  deploy-vps:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ github.ref_name }}
          path: frontend/dist/

      - name: Extract tag
        id: meta
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Ensure deploy path exists
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p ${{ vars.DEPLOY_PATH }}/data
            mkdir -p ${{ vars.DEPLOY_PATH }}/frontend/dist
            sudo chown -R $(whoami): ${{ vars.DEPLOY_PATH }}

      - name: Copy config and compose files to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml,config.prod.yaml"
          target: "${{ vars.DEPLOY_PATH }}/"

      - name: Copy frontend dist to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "frontend/dist/"
          target: "${{ vars.DEPLOY_PATH }}/frontend/"
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ vars.DEPLOY_PATH }}

            # Écrire le .env de production (réécrit à chaque déploiement)
            cat > .env << 'ENVEOF'
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            GHCR_OWNER=${{ github.repository_owner }}
            RELEASE_TAG=${{ steps.meta.outputs.tag }}
            DERIBIT_CLIENT_ID=${{ secrets.DERIBIT_CLIENT_ID }}
            DERIBIT_CLIENT_SECRET=${{ secrets.DERIBIT_CLIENT_SECRET }}
            DERIVE_WALLET_ADDRESS=${{ secrets.DERIVE_WALLET_ADDRESS }}
            DERIVE_SUBACCOUNT_ID=${{ secrets.DERIVE_SUBACCOUNT_ID }}
            DERIVE_SESSION_PRIVATE_KEY=${{ secrets.DERIVE_SESSION_PRIVATE_KEY }}
            BOT_TOKEN=${{ secrets.BOT_TOKEN }}
            CHAT_ID=${{ secrets.CHAT_ID }}
            CONFIG_PATH=/app/config.yaml
            ENVEOF
            chmod 600 .env

            # Déployer la config de prod (mode live, limites $50)
            cp config.prod.yaml config.yaml

            # Login GHCR avec token read-only
            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.repository_owner }} --password-stdin

            # ⚠️ Kill executor avant tout restart pour éviter les positions orphelines
            touch data/EXECUTOR_DISABLED
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              stop executor 2>/dev/null || true
            sleep 3

            # Pull la nouvelle image depuis GHCR
            RELEASE_TAG=${{ steps.meta.outputs.tag }} \
              docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

            # Migrations — sans --no-deps pour respecter le healthcheck postgres
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up migrate

            # Restart api et workers
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --no-deps api workers

            # Reload Caddy pour servir le nouveau dist/
            sudo systemctl reload caddy

            # Re-activer l'executor
            rm -f data/EXECUTOR_DISABLED
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --no-deps executor

            # Vérifier que l'API répond
            sleep 5
            curl -sf http://localhost:8001/health || \
              (docker compose -f docker-compose.yml -f docker-compose.prod.yml logs api --tail=50 && exit 1)

            # Nettoyer les anciennes images (garder 3)
            docker images "ghcr.io/${{ github.repository_owner }}/option-arb" -q \
              | tail -n +4 | xargs -r docker rmi 2>/dev/null || true

  github-release:
    needs: deploy-vps
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
