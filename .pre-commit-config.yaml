exclude: \.env$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
        exclude: frontend/tsconfig.*\.json$
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.2
    hooks:
      - id: ruff-format
        files: ^backend/
      - id: ruff
        args: [--fix]
        files: ^backend/

  - repo: local
    hooks:
      - id: mypy
        name: mypy typecheck
        entry: bash -c 'cd backend && uv run mypy src'
        language: system
        pass_filenames: false
        files: ^backend/.*\.py$

      - id: frontend-lint-staged
        name: frontend eslint
        entry: bash -c 'cd frontend && npx lint-staged'
        language: system
        pass_filenames: false
        files: ^frontend/.*\.(ts|tsx)$

      - id: frontend-tsc
        name: frontend typecheck
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        pass_filenames: false
        files: ^frontend/.*\.(ts|tsx)$

      - id: check-config-danger
        name: "config.yaml — valeurs de production détectées"
        entry: >-
          bash -c '
          bad=$(git show :config.yaml 2>/dev/null | grep -nE "^\s*(mode:\s*live|network:\s*mainnet)");
          [ -z "$bad" ] || {
            printf "\n[DANGER] config.yaml stagé contient des valeurs de production :\n\n%s\n\n  -> Utilise config.local.yaml pour tes surcharges locales (gitignorée).\n  -> Pour forcer quand même : SKIP=check-config-danger git commit ...\n\n" "$bad";
            exit 1;
          }'
        language: system
        pass_filenames: false
        files: ^config\.yaml$
